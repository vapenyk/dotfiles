[arch]
packages = [
  # wayland core
  { name = "sddm", hooks = { after_install = [
    "sudo",
    "systemctl",
    "enable",
    "sddm"
  ] } },
  "niri-git",
  "adw-gtk-theme",
  "gnome-keyring",
  "noto-fonts",
  "noto-fonts-emoji",
  "wlsunset",
  "xdg-desktop-portal-gnome",
  "xdg-desktop-portal-gtk",
  "xwayland-satellite",
  "brightnessctl",
  "wlr-randr",
  "ddcutil",
  "cliphist",
  "wtype",
  { name = "swayidle", hooks = { after_install = [
    "systemctl",
    "--user",
    "add-wants",
    "niri.service",
    "swayidle.service"
  ] } },
  "xdg-terminal-exec",

  # graphics & multimedia
  "imagemagick",
  "ffmpeg",
  "qt6-multimedia-ffmpeg",
  "python",
  "cava",
  "matugen",
  "kimageformats",

  # gui apps
  "nautilus",
  "nautilus-python",
  "sushi",
  "cups-pk-helper",

  # shell / dms-shell deps
  "noctalia-qs",

  # network
  # { name = "iwd", hooks = { after_install = [
